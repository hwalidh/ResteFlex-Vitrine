services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resteflex-concierge
    ports:
      - "4200:4200"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4200/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
