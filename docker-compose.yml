services:
  vitrine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resteflex-vitrine
    ports:
      - "4200:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
