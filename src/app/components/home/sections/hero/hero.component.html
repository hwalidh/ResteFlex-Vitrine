<!-- Hero Section -->
<section id="hero" class="hero-section">
  <div class="absolute inset-0 bg-gradient-to-r from-violet-900 to-indigo-900 opacity-90"></div>
  <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80')] bg-cover bg-center opacity-20 parallax"></div>

  <!-- Contenu centré -->
  <div class="relative z-10 container mx-auto px-4 flex flex-col items-center justify-center text-center hero-content">

    <h1 class="text-5xl md:text-7xl font-bold text-white mb-6 animate-slide-up">
      <span class="bg-clip-text text-transparent bg-gradient-to-r from-violet-200 via-fuchsia-300 to-indigo-200">
        Hey ! 👋
      </span>
    </h1>

    <p class="text-2xl md:text-3xl text-blue-100 mb-4 opacity-0 animate-slide-up" style="animation-delay: 0.2s">
      On s'occupe de tout
    </p>
    <p class="text-lg md:text-xl text-blue-200 mb-10 max-w-2xl mx-auto opacity-0 animate-slide-up" style="animation-delay: 0.3s">
      Pendant que vous profitez de la vie
    </p>

    <!-- Stats Cards -->
    <div class="grid md:grid-cols-3 gap-6 max-w-5xl w-full mx-auto opacity-0 animate-slide-up mb-10" style="animation-delay: 0.4s">
      <div class="bg-white/10 backdrop-blur-sm rounded-xl p-4 md:p-6 transform hover:scale-105 transition-all duration-300">
        <div class="flex items-center justify-center mb-4">
          <svg class="w-6 md:w-8 h-6 md:h-8 text-violet-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <h3 class="text-lg md:text-xl font-bold text-white mb-2">On répond vite ⚡️</h3>
        <p class="text-sm md:text-base text-blue-100">En moins de 15min</p>
      </div>

      <div class="bg-white/10 backdrop-blur-sm rounded-xl p-4 md:p-6 transform hover:scale-105 transition-all duration-300">
        <div class="flex items-center justify-center mb-4">
          <svg class="w-6 md:w-8 h-6 md:h-8 text-violet-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <h3 class="text-lg md:text-xl font-bold text-white mb-2">Jour et nuit 🌙</h3>
        <p class="text-sm md:text-base text-blue-100">On est là pour vous</p>
      </div>

      <div class="bg-white/10 backdrop-blur-sm rounded-xl p-4 md:p-6 transform hover:scale-105 transition-all duration-300">
        <div class="flex items-center justify-center mb-4">
          <svg class="w-6 md:w-8 h-6 md:h-8 text-violet-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
          </svg>
        </div>
        <h3 class="text-lg md:text-xl font-bold text-white mb-2">100% digital 📱</h3>
        <p class="text-sm md:text-base text-blue-100">Simple et efficace</p>
      </div>
    </div>

    <!-- CTA — centré sous les cartes, visible sans scroller -->
    <div class="opacity-0 animate-slide-up" style="animation-delay: 0.6s">
      <a routerLink="/contact"
         class="inline-flex items-center px-8 py-4 bg-gradient-to-r from-violet-500 to-fuchsia-500
                text-white font-semibold rounded-full
                transform hover:-translate-y-1 transition-all duration-300
                hover:shadow-xl hover:shadow-violet-500/30 text-base md:text-lg">
        C'est parti ! 🚀
        <svg class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/>
        </svg>
      </a>
    </div>
  </div>

  <!-- Scroll indicator — toujours visible en bas de l'écran -->
  <div class="scroll-indicator" (click)="scrollDown()">
    <span class="scroll-indicator__text">Découvrir</span>
    <div class="scroll-indicator__arrow">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
      </svg>
    </div>
  </div>

  <!-- Dégradé bas de section -->
  <div class="scroll-fade-hint"></div>
</section>
